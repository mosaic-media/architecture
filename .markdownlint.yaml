# markdownlint configuration for the Mosaic documentation repository.
#
# ---------------------------------------------------------------------------
# READ THIS BEFORE "FIXING" THE HEADING STRUCTURE
# ---------------------------------------------------------------------------
#
# Mosaic specifications do NOT follow the usual "one H1 per document" web
# convention, and that is deliberate, not an accident to be tidied up.
#
# Every authored file under docs/ begins with an HTML metadata comment:
#
#     <!--
#     File: docs/engineering/architecture/mac-001-platform-architecture/index.md
#     Document: MAC-001
#     Status: Draft
#     Version: 0.4
#     -->
#
# and then uses `#` for EVERY top-level section within the chapter — Purpose,
# Scope, Relationship To Other Documents, and so on — with `##` reserved for
# subsections. A single chapter file routinely contains ten or more `#`
# headings. MkDocs Material renders each chapter as its own page, so the
# per-page title comes from navigation rather than from a lone H1.
#
# Three rules therefore have to be switched off rather than satisfied:
#
#   MD041 (first-line-heading)  — 664 of 665 Markdown files start with the
#                                 metadata comment, not a heading.
#   MD025 (single-title)        — multiple `#` headings per file is the style.
#   MD024 (no-duplicate-heading)— section names such as "Purpose",
#                                 "Definition" and "Relationship to MEG-002"
#                                 intentionally recur within a file.
#
# Turning any of these back on would flag essentially the entire repository.
# If you want to change the house style, change MDG-001 first:
#   docs/engineering/documentation/mdg-001-documentation-authority-guide/
#     07-repository-organisation.md
#
# ---------------------------------------------------------------------------

default: false

# --- Structure -------------------------------------------------------------

# Heading levels increment by one. Catches `#` followed directly by `###`.
MD001: true

# Consistent ATX headings (`# Heading`, never Setext underlines).
MD003:
  style: atx

# --- Lists -----------------------------------------------------------------

# Unordered lists use `-` throughout the repository.
MD004:
  style: dash

# Consistent indentation for list items at the same level.
MD005: true

# Nested list indentation. The repository nests with two spaces.
MD007:
  indent: 2

# Ordered lists are written 1. 2. 3. and are rendered in that order.
MD029:
  style: ordered

# Exactly one space after a list marker.
MD030: true

# --- Whitespace ------------------------------------------------------------

# No trailing spaces. The repository is currently clean; keep it that way.
# br_spaces 0 disallows the two-space line break in favour of explicit <br/>.
MD009:
  br_spaces: 0

# No hard tabs. The repository is currently clean.
MD010: true

# No more than one consecutive blank line. Repository is currently clean.
MD012:
  maximum: 1

# --- Blank line separation -------------------------------------------------
# The house style separates every block element with blank lines, and these
# rules are what keep Markdown parsers agreeing on the result.

MD022: true   # blank lines around headings
MD031: true   # blank lines around fenced code blocks
MD032: true   # blank lines around lists
MD058: true   # blank lines around tables

# --- Code ------------------------------------------------------------------

# Fenced code blocks only; no indented code blocks.
MD046:
  style: fenced

# Consistent inline code span style.
MD048:
  style: backtick

# Every fenced block declares a language. Mermaid diagrams are `mermaid`;
# repository trees, commands, schemas and wireframes are `text`, which
# MDG-001 04 — Writing Standards explicitly sanctions as the fence for
# fixed-width literal content.
#
# NOTE: roughly 1,280 fences in the current content are still unlabelled.
# See the report accompanying this configuration before enabling in CI.
MD040: true

# --- Files -----------------------------------------------------------------

# Files end with a single newline. Repository is currently clean.
MD047: true

# --- Inline HTML -----------------------------------------------------------

# MD033 does not flag HTML comments, so the metadata blocks are unaffected.
# `<br/>` is used inside table cells where a blank line is impossible; it is
# the only inline element the content actually needs.
MD033:
  allowed_elements:
    - br

# ---------------------------------------------------------------------------
# Rules deliberately NOT enabled, with reasons
# ---------------------------------------------------------------------------
#
# MD013 (line-length)
#   Prose is written one sentence per line with no wrapping. Long lines are
#   the intended style and make Git diffs sentence-granular.
#
# MD024 (no-duplicate-heading)
#   See the note at the top of this file. ~93 intentional duplicates.
#
# MD025 (single-title)  — see the note at the top of this file.
# MD041 (first-line-heading) — see the note at the top of this file.
#
# MD026 (no-trailing-punctuation-in-heading)
#   Seven headings are bare enumerations such as `## 1.`. Low value.
#
# MD034 (no-bare-urls)
#   References chapters list source URLs on their own line as citations
#   rather than as prose links. 63 occurrences, all intentional.
#
# MD036 (no-emphasis-as-heading)
#   The house style uses bolded blockquote pull-outs for key statements,
#   for example `> **The Platform is a runtime, not an application.**`.
#   These are emphasis for weight, not substitute headings. ~1,099 lines.
#
# MD044 (proper-names)
#   Terminology and proper-noun enforcement belongs to Vale, which has the
#   MDG-001 vocabulary and the scoped exemptions. Doing it in two tools
#   would produce two sources of truth.
