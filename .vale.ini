# Vale configuration for the Mosaic documentation repository.
#
# The house style is defined by MDG-001 — Documentation Authority Guide,
# specifically:
#   docs/engineering/documentation/mdg-001-documentation-authority-guide/04-writing-standards.md
#   docs/engineering/documentation/mdg-001-documentation-authority-guide/10-standards-mapping.md
#
# Vale is advisory tooling. MDG-001 remains the source of truth; where the two
# disagree, MDG-001 wins and this configuration should be corrected.

StylesPath = styles

# warning is the lowest level surfaced. Rules in styles/Mosaic use only
# `error` (terminology, which is mechanical and unambiguous) and `warning`
# (typography and heading style, which need human judgement).
MinAlertLevel = warning

# Project proper nouns and accepted terms.
# styles/config/vocabularies/Mosaic/accept.txt
Vocab = Mosaic

# Markdown under docs/ and templates/ is the only authored content in this
# repository. site/ and output/ are generated and are never linted.
[*.md]
BasedOnStyles = Mosaic

# ---------------------------------------------------------------------------
# Scoped exemptions
#
# Each exemption below exists because the flagged word is the canonical
# vocabulary of the document's own subject matter, not a terminology slip.
# Keep this list short and justified; it is not a dumping ground for
# inconvenient alerts.
# ---------------------------------------------------------------------------

# MEG-004 is the Hexagonal Architecture guide. "Adapter", "Driving Adapter"
# and "Driven Adapter" are the load-bearing terms of the pattern, and
# 04-writing-standards.md explicitly exempts Hexagonal Architecture from the
# Provider-over-Adapter preference.
[docs/engineering/guides/meg-004-hexagonal-architecture/*.md]
Mosaic.Terminology = NO

# MIP-005 defines the Module Adapter Contract Protocol. "Adapter" is in the
# document's own title and contract vocabulary.
[docs/engineering/protocols/mip-005-module-adapter-contract-protocol/*.md]
Mosaic.Terminology = NO

# MEG-003 is the Domain-Driven Design guide. "Domain Service", "Application
# Service" and "Core Domain" are DDD terms of art, not Mosaic Capabilities.
[docs/engineering/guides/meg-003-domain-driven-design/*.md]
Mosaic.Terminology = NO

# MEG-005 defines the Runtime Architecture, where "Runtime Service" and
# "Service Registry" are Platform-owned nouns defined in its own glossary.
[docs/engineering/guides/meg-005-runtime-architecture/*.md]
Mosaic.Terminology = NO

# MAD-001, MAD-002 and MEG-015 use "Core Platform" as an established
# three-tier architectural term distinguishing Core Platform stores from
# built-in and third-party Module stores.
[docs/engineering/architecture/mad-001-transactional-store-extensibility/*.md]
Mosaic.Terminology = NO

[docs/engineering/architecture/mad-002-module-storage-and-delivery-model/*.md]
Mosaic.Terminology = NO

[docs/engineering/guides/meg-015-platform-foundation-implementation/*.md]
Mosaic.Terminology = NO

# MDG-001 chapters 04 and 10 quote the discouraged terms and the uppercase
# RFC 2119 keywords in order to define the rules about them.
[docs/engineering/documentation/mdg-001-documentation-authority-guide/*.md]
Mosaic.Terminology = NO
Mosaic.Normative = NO

# References chapters cite external works by their published titles
# (for example "Designing Data-Intensive Applications"). Those titles must
# not be rewritten to satisfy the heading rule.
[docs/**/references.md]
Mosaic.Headings = NO

# Glossary chapters use the defined term itself as the heading, including
# terms such as "Adapter", "Service" and "Feature" that the glossary exists
# to define.
[docs/**/glossary.md]
Mosaic.Terminology = NO

# templates/ contains deliberate placeholder prose and instructional comments
# describing what an author should write, not finished specification text.
[templates/**/*.md]
Mosaic.Terminology = NO
Mosaic.Headings = NO
